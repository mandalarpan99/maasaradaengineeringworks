<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Maa Sarada Engineering works — Precision metal fabrication, collapsible gates, roof shades, metal gates and windows at Dakshin Barasat, WB" />
    <title>MAA SARADA ENG. WORKS</title>

    <!-- Fonts: Oswald (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom SteelCraft favicon — hexagonal bolt with SC lettermark -->
    <link rel="icon"                   type="image/png" sizes="32x32"   href="/favicone/favicon-32x32.png" />
    <link rel="icon"                   type="image/png" sizes="16x16"   href="/favicone/favicon-16x16.png" />
    <link rel="icon"                   type="image/png" sizes="512x512" href="/favicone/android-chrome-512x512.png" />
    <link rel="apple-touch-icon"       type="image/png" sizes="192x192" href="/favicon/apple-touch-icone.png" />
    <!-- Fallback: highest-res PNG as default icon -->
    <link rel="shortcut icon"          type="image/png"                 href="/favicon.png" />
    <!-- PWA theme colour matches gunmetal brand colour -->
    <meta name="theme-color" content="#2C3539" />
    <meta name="msapplication-TileColor" content="#0047AB" />
    <meta name="msapplication-TileImage" content="/favicon-192.png" />

    <style>
      /* Prevent FOUC */
      html { background: #2C3539; }
      #root { min-height: 100vh; }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
